# Port for the game socket (SSL/TLS encrypted)
game.socket.port=7675

# Optional plain HTTP status endpoint. Only expose it if you need public status checks.
http.status.enabled=true
http.status.port=7674

# Ticks Per Second - controls game simulation speed
server.tps=20

# Thread pool size for concurrent player connections
server.thread.pool.size=50

# Maximum number of processor cores the server can use (0 = use all available)
server.processor.limit=0

# Maximum RAM in MB the server is allowed to use (0 = unlimited)
server.ram.limit=0

# Maximum number of worker threads allowed for background tasks (0 = unlimited)
server.worker.thread.limit=200

# Path to the keystore file for SSL/TLS certificates
keystore.path=keystore.jks

# Validity period for self-signed certificates (in days)
keystore.validity.days=365
