plugins {
    id 'java'
    id 'application'
}

group 'com.protonova'
version '1.0-SNAPSHOT'

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
    // any other dependencies
}

application {
    mainClass = 'main.Main'  // <- point to the fully-qualified Main class
}
